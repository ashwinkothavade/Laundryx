server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Cache static assets aggressively; they are content-hashed by Vite.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback — every unknown route serves index.html so react-router
  # can handle client-side routing (mirrors frontend/vercel.json rewrites).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
